<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Diretoria — Gente</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --surface-alt: #F0EDE8;
    --border: #E2DED6; --border-light: #ECEAE5;
    --text-primary: #1A1A1A; --text-secondary: #6B6560; --text-muted: #9C9590;
    --accent: #F5A623; --accent-light: #FFF5E0; --accent-dark: #D4870A;
    --cat-rdg: #D4740A; --cat-rdg-bg: #FFF5E6; --cat-rdg-border: #FDDBA0;
    --cat-ps: #7B2D8B; --cat-ps-bg: #F8EDF9; --cat-ps-border: #E4BDE9;
    --cat-align: #2563EB; --cat-align-bg: #EBF2FF; --cat-align-border: #BDDAFF;
    --cat-conv: #C41E3A; --cat-conv-bg: #FFF0F0; --cat-conv-border: #F5C6C6;
    --cat-banca: #0E7C6B; --cat-banca-bg: #E6F7F4; --cat-banca-border: #A8DDD3;
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06); --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    --radius: 12px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text-primary); min-height:100vh; -webkit-font-smoothing:antialiased; }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:20px 48px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; flex-wrap:wrap; gap:12px; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .header-logo { height:44px; width:auto; }
  .header-titles { display:flex; flex-direction:column; }
  .header h1 { font-size:22px; font-weight:700; letter-spacing:-0.3px; line-height:1.2; }
  .header .badge { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--accent-dark); background:var(--accent-light); padding:3px 10px; border-radius:20px; width:fit-content; margin-top:2px; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .btn-edit-toggle { display:flex; align-items:center; gap:8px; padding:9px 20px; border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; border:1px solid var(--border); background:var(--surface); color:var(--text-secondary); }
  .btn-edit-toggle:hover { border-color:var(--text-muted); }
  .btn-edit-toggle.active { background:#FEF3C7; border-color:#F59E0B; color:#92400E; }
  .btn-edit-toggle svg { width:16px; height:16px; }
  .btn-add { display:none; align-items:center; gap:8px; background:var(--accent); color:#fff; border:none; padding:10px 22px; border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .btn-add.visible { display:flex; }
  .btn-add:hover { background:var(--accent-dark); transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .btn-add svg { width:18px; height:18px; }
  .toolbar { padding:16px 48px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .filters-group { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .filter-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-right:4px; }
  .filter-btn { padding:7px 16px; border-radius:20px; border:1px solid var(--border); background:var(--surface); font-family:'Poppins',sans-serif; font-size:12px; font-weight:500; color:var(--text-secondary); cursor:pointer; transition:all 0.2s; }
  .filter-btn:hover { border-color:var(--text-muted); }
  .filter-btn.active { background:var(--text-primary); color:#fff; border-color:var(--text-primary); }
  .view-toggle { display:flex; }
  .view-btn { padding:8px 16px; border:1px solid var(--border); background:var(--surface); font-family:'Poppins',sans-serif; font-size:12px; font-weight:500; color:var(--text-secondary); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:6px; }
  .view-btn:first-child { border-radius:var(--radius-sm) 0 0 var(--radius-sm); }
  .view-btn:last-child { border-radius:0 var(--radius-sm) var(--radius-sm) 0; border-left:none; }
  .view-btn.active { background:var(--text-primary); color:#fff; border-color:var(--text-primary); }
  .view-btn svg { width:15px; height:15px; }
  .main { padding:8px 48px 60px; }
  .month-section { margin-bottom:40px; }
  .month-header { display:flex; align-items:baseline; gap:12px; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid var(--accent); }
  .month-name { font-size:20px; font-weight:700; }
  .month-count { font-size:12px; color:var(--text-muted); font-weight:500; }
  .event-card { display:grid; grid-template-columns:80px 1fr auto; align-items:center; background:var(--surface); border:1px solid var(--border-light); border-radius:var(--radius); padding:18px 24px; margin-bottom:8px; transition:all 0.2s; animation:fadeIn 0.3s ease; }
  .event-card:hover { box-shadow:var(--shadow-md); border-color:var(--border); transform:translateX(4px); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .event-date-col { font-size:26px; font-weight:700; line-height:1; }
  .event-date-col span { display:block; font-size:11px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
  .event-info { padding-left:24px; border-left:1px solid var(--border-light); }
  .event-title { font-size:14px; font-weight:600; margin-bottom:6px; }
  .event-meta { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  .event-tag { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; padding:3px 10px; border-radius:4px; }
  .tag-rdg { color:var(--cat-rdg); background:var(--cat-rdg-bg); border:1px solid var(--cat-rdg-border); }
  .tag-ps { color:var(--cat-ps); background:var(--cat-ps-bg); border:1px solid var(--cat-ps-border); }
  .tag-align { color:var(--cat-align); background:var(--cat-align-bg); border:1px solid var(--cat-align-border); }
  .tag-conv { color:var(--cat-conv); background:var(--cat-conv-bg); border:1px solid var(--cat-conv-border); }
  .tag-banca { color:var(--cat-banca); background:var(--cat-banca-bg); border:1px solid var(--cat-banca-border); }
  .event-time-label,.event-location-label { font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:4px; }
  .event-location-label { color:var(--text-secondary); }
  .event-actions { display:flex; gap:4px; opacity:0; transition:opacity 0.2s; }
  .event-card:hover .event-actions { opacity:1; }
  .edit-hidden .event-actions { display:none !important; }
  .btn-icon { width:34px; height:34px; border:none; background:transparent; border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:all 0.15s; }
  .btn-icon:hover { background:var(--surface-alt); color:var(--text-primary); }
  .btn-icon.delete:hover { background:#FEE2E2; color:#DC2626; }
  .btn-icon svg { width:16px; height:16px; }
  .calendar-container { display:none; } .calendar-container.active { display:block; }
  .list-container.active { display:block; } .list-container { display:none; }
  .cal-nav { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:24px; }
  .cal-nav-btn { width:36px; height:36px; border:1px solid var(--border); background:var(--surface); border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); transition:all 0.15s; }
  .cal-nav-btn:hover { background:var(--surface-alt); border-color:var(--text-muted); }
  .cal-nav-btn svg { width:16px; height:16px; }
  .cal-month-title { font-size:20px; font-weight:700; min-width:220px; text-align:center; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border-light); border:1px solid var(--border-light); border-radius:var(--radius); overflow:hidden; }
  .cal-weekday { background:var(--surface-alt); padding:10px 8px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); text-align:center; }
  .cal-day { background:var(--surface); min-height:110px; padding:8px; position:relative; transition:background 0.15s; }
  .cal-day:hover { background:#FAFAF8; }
  .cal-day.empty { background:var(--surface-alt); opacity:0.5; }
  .cal-day.today { background:#FFFBEB; }
  .cal-day-num { font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:4px; }
  .cal-day.today .cal-day-num { color:#92400E; background:var(--accent-light); width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; }
  .cal-event { font-size:10px; font-weight:500; padding:3px 6px; border-radius:4px; margin-bottom:2px; cursor:default; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:transform 0.1s; }
  .cal-event:hover { transform:scale(1.02); }
  .cal-event.editable { cursor:pointer; }
  .cal-event-rdg { background:var(--cat-rdg-bg); color:var(--cat-rdg); border-left:3px solid var(--cat-rdg); }
  .cal-event-ps { background:var(--cat-ps-bg); color:var(--cat-ps); border-left:3px solid var(--cat-ps); }
  .cal-event-align { background:var(--cat-align-bg); color:var(--cat-align); border-left:3px solid var(--cat-align); }
  .cal-event-conv { background:var(--cat-conv-bg); color:var(--cat-conv); border-left:3px solid var(--cat-conv); }
  .cal-event-banca { background:var(--cat-banca-bg); color:var(--cat-banca); border-left:3px solid var(--cat-banca); }
  .cal-day-add { position:absolute; top:6px; right:6px; width:20px; height:20px; border:none; background:var(--accent-light); color:var(--accent-dark); border-radius:50%; cursor:pointer; display:none; align-items:center; justify-content:center; font-size:14px; font-weight:700; transition:all 0.15s; }
  .cal-day-add:hover { background:var(--accent); color:#fff; }
  .cal-day:hover .cal-day-add.visible { display:flex; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); z-index:1000; display:none; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:16px; width:480px; max-width:92vw; box-shadow:var(--shadow-lg); animation:slideUp 0.3s ease; max-height:90vh; overflow-y:auto; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-header { padding:24px 28px 0; display:flex; justify-content:space-between; align-items:center; }
  .modal-header h2 { font-size:18px; font-weight:700; }
  .modal-close { width:32px; height:32px; border:none; background:var(--surface-alt); border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); transition:all 0.15s; }
  .modal-close:hover { background:var(--border); }
  .modal-body { padding:24px 28px 28px; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); margin-bottom:6px; }
  .form-group input,.form-group select { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:13px; color:var(--text-primary); background:var(--surface); transition:border-color 0.2s; }
  .form-group input:focus,.form-group select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-footer { padding:0 28px 24px; display:flex; gap:10px; justify-content:flex-end; }
  .btn-cancel { padding:10px 20px; border:1px solid var(--border); background:var(--surface); border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:13px; font-weight:500; color:var(--text-secondary); cursor:pointer; transition:all 0.15s; }
  .btn-cancel:hover { background:var(--surface-alt); }
  .btn-save { padding:10px 24px; border:none; background:var(--accent); border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; color:#fff; cursor:pointer; transition:all 0.15s; }
  .btn-save:hover { background:var(--accent-dark); }
  .pw-modal { background:var(--surface); border-radius:16px; padding:32px; width:360px; max-width:90vw; box-shadow:var(--shadow-lg); text-align:center; animation:slideUp 0.3s ease; }
  .pw-modal h3 { font-size:18px; font-weight:700; margin-bottom:6px; }
  .pw-modal p { font-size:12px; color:var(--text-secondary); margin-bottom:20px; }
  .pw-modal input { width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:16px; text-align:center; letter-spacing:8px; margin-bottom:8px; }
  .pw-modal input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
  .pw-error { color:#DC2626; font-size:11px; font-weight:600; min-height:18px; margin-bottom:12px; }
  .pw-actions { display:flex; gap:10px; justify-content:center; }
  .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1100; display:none; align-items:center; justify-content:center; }
  .confirm-overlay.open { display:flex; }
  .confirm-box { background:var(--surface); border-radius:16px; padding:28px; width:380px; max-width:90vw; box-shadow:var(--shadow-lg); text-align:center; animation:slideUp 0.3s ease; }
  .confirm-box h3 { font-size:16px; font-weight:700; margin-bottom:8px; }
  .confirm-box p { font-size:13px; color:var(--text-secondary); margin-bottom:24px; }
  .confirm-actions { display:flex; gap:10px; justify-content:center; }
  .btn-delete-confirm { padding:10px 24px; border:none; background:#DC2626; border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; color:#fff; cursor:pointer; }
  .btn-delete-confirm:hover { background:#B91C1C; }
  .toast { position:fixed; bottom:32px; right:32px; background:var(--text-primary); color:#fff; padding:14px 24px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; box-shadow:var(--shadow-lg); z-index:2000; transform:translateY(80px); opacity:0; transition:all 0.3s ease; }
  .toast.show { transform:translateY(0); opacity:1; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .empty-state svg { width:48px; height:48px; margin-bottom:16px; opacity:0.4; }
  .empty-state p { font-size:14px; }
  .event-popup { position:fixed; z-index:900; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; box-shadow:var(--shadow-lg); min-width:240px; max-width:320px; animation:fadeIn 0.2s ease; }
  .event-popup .ep-title { font-size:14px; font-weight:700; margin-bottom:8px; }
  .event-popup .ep-row { font-size:11px; color:var(--text-secondary); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
  .event-popup .ep-actions { display:flex; gap:6px; margin-top:12px; }
  .event-popup .ep-btn { padding:6px 14px; border-radius:6px; font-family:'Poppins',sans-serif; font-size:11px; font-weight:600; cursor:pointer; border:none; transition:all 0.15s; }
  .ep-btn-edit { background:var(--accent-light); color:var(--accent-dark); }
  .ep-btn-edit:hover { background:var(--accent); color:#fff; }
  .ep-btn-del { background:#FEE2E2; color:#DC2626; }
  .ep-btn-del:hover { background:#DC2626; color:#fff; }
  .ep-btn-close { background:var(--surface-alt); color:var(--text-secondary); }
  .ep-btn-close:hover { background:var(--border); }
  /* COLOR PANEL */
  .btn-colors { display:none; align-items:center; gap:8px; padding:9px 20px; border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; border:1px solid var(--border); background:var(--surface); color:var(--text-secondary); }
  .btn-colors:hover { border-color:var(--text-muted); }
  .btn-colors.visible { display:flex; }
  .btn-colors svg { width:16px; height:16px; }
  .color-panel { background:var(--surface); border-radius:16px; width:420px; max-width:92vw; box-shadow:var(--shadow-lg); animation:slideUp 0.3s ease; max-height:90vh; overflow-y:auto; }
  .color-panel .modal-header { padding:24px 28px 0; display:flex; justify-content:space-between; align-items:center; }
  .color-panel .modal-header h2 { font-size:18px; font-weight:700; }
  .color-panel .modal-body { padding:20px 28px 28px; }
  .color-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border-light); }
  .color-row:last-child { border-bottom:none; }
  .color-preview { width:32px; height:32px; border-radius:8px; border:2px solid var(--border); flex-shrink:0; }
  .color-row-label { flex:1; font-size:13px; font-weight:600; color:var(--text-primary); }
  .color-row input[type="color"] { width:40px; height:34px; border:1px solid var(--border); border-radius:6px; cursor:pointer; padding:2px; background:var(--surface); }
  .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding:0; }
  .color-row input[type="color"]::-webkit-color-swatch { border:none; border-radius:4px; }
  .color-panel .modal-footer { padding:0 28px 24px; display:flex; gap:10px; justify-content:flex-end; }
  .btn-reset-colors { padding:10px 20px; border:1px solid var(--border); background:var(--surface); border-radius:var(--radius-sm); font-family:'Poppins',sans-serif; font-size:12px; font-weight:500; color:var(--text-secondary); cursor:pointer; transition:all 0.15s; margin-right:auto; }
  .btn-reset-colors:hover { background:var(--surface-alt); }
  @media (max-width:768px) {
    .header { padding:16px 20px; } .toolbar { padding:12px 20px; } .main { padding:8px 16px 40px; }
    .event-card { grid-template-columns:60px 1fr auto; padding:14px 16px; } .event-date-col { font-size:22px; }
    .event-actions { opacity:1; } .modal { width:95vw; } .form-row { grid-template-columns:1fr; }
    .cal-day { min-height:80px; padding:4px; } .cal-event { font-size:9px; padding:2px 4px; } .cal-day-num { font-size:10px; }
  }
</style>
</head>
<body>

let nextId = 21, editingId = null, deletingId = null, activeFilter = 'all';
let currentView = 'list', editMode = false, calYear = 2026, calMonth = 2, openPopup = null;

function toggleEditMode() {
  if (editMode) { editMode = false; updateEditUI(); showToast('Modo edição desativado.'); }
  else { document.getElementById('pwOverlay').classList.add('open'); document.getElementById('pwInput').value = ''; document.getElementById('pwError').textContent = ''; setTimeout(() => document.getElementById('pwInput').focus(), 100); }
}
function checkPassword() {
  if (document.getElementById('pwInput').value === EDIT_PASSWORD) { editMode = true; closePwModal(); updateEditUI(); showToast('Modo edição ativado.'); }
  else { document.getElementById('pwError').textContent = 'Senha incorreta. Tente novamente.'; document.getElementById('pwInput').value = ''; document.getElementById('pwInput').focus(); }
}
function closePwModal() { document.getElementById('pwOverlay').classList.remove('open'); }
function updateEditUI() {
  const btn = document.getElementById('btnEditToggle'), addBtn = document.getElementById('btnAdd'), label = document.getElementById('editToggleLabel'), colorsBtn = document.getElementById('btnColors');
  if (editMode) { btn.classList.add('active'); label.textContent = 'Edição Ativa'; addBtn.classList.add('visible'); colorsBtn.classList.add('visible'); document.body.classList.remove('edit-hidden'); }
  else { btn.classList.remove('active'); label.textContent = 'Modo Edição'; addBtn.classList.remove('visible'); colorsBtn.classList.remove('visible'); document.body.classList.add('edit-hidden'); }
  renderAll();
}
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  document.getElementById('listContainer').classList.toggle('active', v === 'list');
  document.getElementById('calendarContainer').classList.toggle('active', v === 'calendar');
  renderAll();
}
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); activeFilter = btn.dataset.filter; renderAll(); });
});
function getFilteredEvents() { return activeFilter === 'all' ? [...events] : events.filter(e => e.category === activeFilter); }
function dateStr(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function getEventsForDate(ds) {
  return getFilteredEvents().filter(ev => {
    if (ev.dateStart === ds) return true;
    if (ev.dateEnd) { const s=new Date(ev.dateStart+'T12:00:00'), e=new Date(ev.dateEnd+'T12:00:00'), d=new Date(ds+'T12:00:00'); return d>=s&&d<=e; }
    return false;
  });
}
function renderAll() { closePopupIfOpen(); if (currentView === 'list') renderList(); else renderCalendar(); }

function renderList() {
  const container = document.getElementById('listContainer');
  let filtered = getFilteredEvents().sort((a,b) => a.dateStart.localeCompare(b.dateStart));
  const grouped = {};
  filtered.forEach(ev => {
    const d = new Date(ev.dateStart+'T12:00:00');
    const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    if (!grouped[key]) grouped[key] = { year:d.getFullYear(), month:d.getMonth(), events:[] };
    grouped[key].events.push(ev);
  });
  if (!filtered.length) { container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>Nenhum evento encontrado.</p></div>`; return; }
  let html = '';
  Object.keys(grouped).sort().forEach(key => {
    const g = grouped[key];
    html += `<section class="month-section"><div class="month-header"><span class="month-name">${MONTHS_PT[g.month]} ${g.year}</span><span class="month-count">${g.events.length} evento${g.events.length>1?'s':''}</span></div>`;
    g.events.forEach(ev => {
      const d = new Date(ev.dateStart+'T12:00:00'), day = d.getDate(), weekday = WEEKDAYS_PT[d.getDay()], cat = CATEGORY_MAP[ev.category];
      let dateLabel = String(day).padStart(2,'0'), dateExtra = weekday;
      if (ev.dateEnd) { const d2 = new Date(ev.dateEnd+'T12:00:00'); dateLabel = `${String(day).padStart(2,'0')}-${String(d2.getDate()).padStart(2,'0')}`; dateExtra = MONTHS_PT[d.getMonth()].substring(0,3); }
      const acts = editMode ? `<div class="event-actions" style="opacity:0"><button class="btn-icon" title="Editar" onclick="openEdit(${ev.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="btn-icon delete" title="Excluir" onclick="openConfirm(${ev.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>` : '';
      html += `<div class="event-card"><div class="event-date-col">${dateLabel}<span>${dateExtra}</span></div><div class="event-info"><div class="event-title">${ev.title}</div><div class="event-meta"><span class="event-tag ${cat.cls}">${cat.label}</span>${ev.time?`<span class="event-time-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${ev.time}</span>`:''}${ev.location?`<span class="event-location-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${ev.location}</span>`:''}</div></div>${acts}</div>`;
    });
    html += `</section>`;
  });
  container.innerHTML = html;
  if (editMode) container.querySelectorAll('.event-card').forEach(card => { card.onmouseenter = () => { const a=card.querySelector('.event-actions'); if(a)a.style.opacity='1'; }; card.onmouseleave = () => { const a=card.querySelector('.event-actions'); if(a)a.style.opacity='0'; }; });
}

function renderCalendar() {
  const container = document.getElementById('calendarContainer');
  const firstDay = new Date(calYear, calMonth, 1), lastDay = new Date(calYear, calMonth+1, 0);
  const startWeekday = firstDay.getDay(), daysInMonth = lastDay.getDate();
  const today = new Date(), todayStr = dateStr(today.getFullYear(), today.getMonth(), today.getDate());
  let html = `<div class="cal-nav"><button class="cal-nav-btn" onclick="calPrev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button><div class="cal-month-title">${MONTHS_PT[calMonth]} ${calYear}</div><button class="cal-nav-btn" onclick="calNext()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button></div><div class="cal-grid">`;
  WEEKDAYS_PT.forEach(w => { html += `<div class="cal-weekday">${w}</div>`; });
  for (let i=0; i<startWeekday; i++) html += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const ds = dateStr(calYear, calMonth, d), isToday = ds===todayStr, dayEvents = getEventsForDate(ds);
    html += `<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${isToday?`<span>${d}</span>`:d}</div>`;
    if (editMode) html += `<button class="cal-day-add visible" onclick="openModalWithDate('${ds}')" title="Adicionar evento">+</button>`;
    dayEvents.forEach(ev => {
      const cat = CATEGORY_MAP[ev.category], click = editMode ? ` onclick="showEventPopup(event,${ev.id})"` : '';
      html += `<div class="cal-event ${cat.calCls}${editMode?' editable':''}"${click} title="${ev.title}${ev.time?' · '+ev.time:''}${ev.location?' · '+ev.location:''}">${ev.title}</div>`;
    });
    html += `</div>`;
  }
  const total = startWeekday+daysInMonth, rem = total%7===0?0:7-(total%7);
  for (let i=0; i<rem; i++) html += `<div class="cal-day empty"></div>`;
  html += `</div>`;
  container.innerHTML = html;
}
function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function showEventPopup(e, id) {
  e.stopPropagation(); closePopupIfOpen();
  const ev = events.find(x => x.id===id); if(!ev) return;
  const cat = CATEGORY_MAP[ev.category], d = new Date(ev.dateStart+'T12:00:00');
  const popup = document.createElement('div'); popup.className = 'event-popup';
  popup.innerHTML = `<div class="ep-title">${ev.title}</div><div class="ep-row"><span class="event-tag ${cat.cls}">${cat.label}</span></div><div class="ep-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}${ev.dateEnd?' — '+ev.dateEnd.split('-').reverse().join('/'):''}</div>${ev.time?`<div class="ep-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${ev.time}</div>`:''}${ev.location?`<div class="ep-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${ev.location}</div>`:''}<div class="ep-actions"><button class="ep-btn ep-btn-edit" onclick="closePopupIfOpen();openEdit(${ev.id})">Editar</button><button class="ep-btn ep-btn-del" onclick="closePopupIfOpen();openConfirm(${ev.id})">Excluir</button><button class="ep-btn ep-btn-close" onclick="closePopupIfOpen()">Fechar</button></div>`;
  document.body.appendChild(popup); openPopup = popup;
  const rect = e.target.getBoundingClientRect();
  let top = rect.bottom+8, left = rect.left;
  if (top+200 > window.innerHeight) top = rect.top-200;
  if (left+300 > window.innerWidth) left = window.innerWidth-320;
  popup.style.top = top+'px'; popup.style.left = Math.max(8,left)+'px';
}
function closePopupIfOpen() { if(openPopup){openPopup.remove();openPopup=null;} }
document.addEventListener('click', e => { if(openPopup && !openPopup.contains(e.target) && !e.target.classList.contains('cal-event')) closePopupIfOpen(); });

function openModal() { if(!editMode)return; editingId=null; document.getElementById('modalTitle').textContent='Novo Evento'; document.getElementById('eventTitle').value=''; document.getElementById('eventCategory').value='rdg'; document.getElementById('eventDateStart').value=''; document.getElementById('eventDateEnd').value=''; document.getElementById('eventTime').value=''; document.getElementById('eventLocation').value=''; document.getElementById('modalOverlay').classList.add('open'); }
function openModalWithDate(ds) { if(!editMode)return; openModal(); document.getElementById('eventDateStart').value=ds; }
function openEdit(id) { if(!editMode)return; const ev=events.find(e=>e.id===id); if(!ev)return; editingId=id; document.getElementById('modalTitle').textContent='Editar Evento'; document.getElementById('eventTitle').value=ev.title; document.getElementById('eventCategory').value=ev.category; document.getElementById('eventDateStart').value=ev.dateStart; document.getElementById('eventDateEnd').value=ev.dateEnd||''; document.getElementById('eventTime').value=ev.time||''; document.getElementById('eventLocation').value=ev.location||''; document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveEvent() {
  const title=document.getElementById('eventTitle').value.trim(), category=document.getElementById('eventCategory').value, dateStart=document.getElementById('eventDateStart').value, dateEnd=document.getElementById('eventDateEnd').value, time=document.getElementById('eventTime').value.trim(), location=document.getElementById('eventLocation').value.trim();
  if(!title||!dateStart){showToast('Preencha o título e a data.');return;}
  if(editingId){const ev=events.find(e=>e.id===editingId);if(ev){ev.title=title;ev.category=category;ev.dateStart=dateStart;ev.dateEnd=dateEnd;ev.time=time;ev.location=location;}showToast('Evento atualizado com sucesso.');}
  else{events.push({id:nextId++,title,category,dateStart,dateEnd,time,location});showToast('Evento adicionado com sucesso.');}
  closeModal(); renderAll();
}
function openConfirm(id) { if(!editMode)return; deletingId=id; const ev=events.find(e=>e.id===id); document.getElementById('confirmText').textContent=`Tem certeza que deseja excluir "${ev?ev.title:''}"?`; document.getElementById('confirmOverlay').classList.add('open'); }
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); deletingId=null; }
function confirmDelete() { if(deletingId){events=events.filter(e=>e.id!==deletingId);showToast('Evento excluído.');closeConfirm();renderAll();} }
function showToast(msg) { const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500); }
document.addEventListener('keydown', e => { if(e.key==='Escape'){closeModal();closeConfirm();closePwModal();closePopupIfOpen();closeColorPanel();} });

// COLOR MANAGEMENT
const DEFAULT_COLORS = { rdg:'#D4740A', ps:'#7B2D8B', align:'#2563EB', conv:'#C41E3A', banca:'#0E7C6B' };
const CAT_LABELS = { rdg:'RDG', ps:'Processo Seletivo', align:'Alinhamento', conv:'Convenção', banca:'Banca PDE' };
let customColors = Object.assign({}, DEFAULT_COLORS);

function hexToRgb(hex) { const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16); return {r,g,b}; }
function lightenColor(hex, factor) {
  const {r,g,b} = hexToRgb(hex);
  const lr = Math.round(r+(255-r)*factor), lg = Math.round(g+(255-g)*factor), lb = Math.round(b+(255-b)*factor);
  return `#${lr.toString(16).padStart(2,'0')}${lg.toString(16).padStart(2,'0')}${lb.toString(16).padStart(2,'0')}`;
}

function applyCssColors() {
  const root = document.documentElement;
  Object.keys(customColors).forEach(key => {
    const color = customColors[key];
    root.style.setProperty(`--cat-${key}`, color);
    root.style.setProperty(`--cat-${key}-bg`, lightenColor(color, 0.88));
    root.style.setProperty(`--cat-${key}-border`, lightenColor(color, 0.65));
  });
}

function openColorPanel() {
  const container = document.getElementById('colorRows');
  let html = '';
  Object.keys(CAT_LABELS).forEach(key => {
    html += `<div class="color-row"><div class="color-preview" id="cp-${key}" style="background:${customColors[key]}"></div><div class="color-row-label">${CAT_LABELS[key]}</div><input type="color" id="cc-${key}" value="${customColors[key]}" onchange="document.getElementById('cp-${key}').style.background=this.value"></div>`;
  });
  container.innerHTML = html;
  document.getElementById('colorOverlay').classList.add('open');
}
function closeColorPanel() { document.getElementById('colorOverlay').classList.remove('open'); }
function applyColors() {
  Object.keys(CAT_LABELS).forEach(key => { customColors[key] = document.getElementById(`cc-${key}`).value; });
  applyCssColors(); closeColorPanel(); renderAll(); showToast('Cores atualizadas com sucesso.');
}
function resetColors() {
  Object.assign(customColors, DEFAULT_COLORS);
  Object.keys(CAT_LABELS).forEach(key => {
    document.getElementById(`cc-${key}`).value = DEFAULT_COLORS[key];
    document.getElementById(`cp-${key}`).style.background = DEFAULT_COLORS[key];
  });
}

document.body.classList.add('edit-hidden');
renderAll();
</script>
